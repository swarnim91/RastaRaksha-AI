services:
  # Backend API
  - type: web
    name: rastaraksha-backend
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./rastaraksha.db
      - key: PYTHON_VERSION
        value: "3.11"
